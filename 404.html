<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Page Not Found - NewsZone Prime</title>

<link rel="stylesheet"
href="style.css">

<style>

.error-container{

max-width:700px;

margin:100px auto;

padding:50px;

text-align:center;

background:#fff;

border-radius:18px;

box-shadow:
0 2px 12px
rgba(0,0,0,0.08);

}

.error-code{

font-size:90px;

font-weight:bold;

color:#111;

margin-bottom:10px;

}

.error-text{

font-size:22px;

color:#444;

margin-bottom:25px;

}

.home-btn{

display:inline-block;

padding:12px 28px;

background:#111;

color:white;

text-decoration:none;

border-radius:10px;

font-weight:bold;

}

.home-btn:hover{

opacity:0.9;

}

</style>

</head>

<body>

<div class="error-container">

<div class="error-code">

404

</div>

<div class="error-text">

Oops! Page not found.

</div>

<p>

The page you are looking for
does not exist.

</p>

<a
href="index.html"
class="home-btn">

Back To Home

</a>

</div>

</body>

</html>
