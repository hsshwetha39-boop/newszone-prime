<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Details - NewsZone Prime</title>
    <link rel="icon" type="jpeg" href="WhatsApp Image 2026-04-24 at 10.56.17 AM.jpeg">
    <link rel="stylesheet" href="style.css">

    <script
type="application/ld+json"
id="news-schema">

{
 "@context":"https://schema.org",

 "@type":"NewsArticle",

 "headline":"NewsZone Prime",

 "author":{
   "@type":"Organization",
   "name":"NewsZone Prime"
 },

 "publisher":{
   "@type":"Organization",
   "name":"NewsZone Prime"
 }

}

</script>

<meta property="og:type" content="article">

<meta property="og:site_name"
content="NewsZone Prime">

<meta property="og:title"
content="NewsZone Prime">

<meta property="og:description"
content="Latest India news and breaking updates">

<meta property="og:image"
content="">

<meta property="og:url"
content="">

<meta name="twitter:card"
content="summary_large_image">

</head>
<body class="news-page">

<!-- NAVBAR -->
<nav class="navbar">

    <!-- LEFT: Logo -->
    <h2 class="logo" onclick="goHome()" style="cursor:pointer;">
        <img src="WhatsApp Image 2026-04-24 at 10.56.17 AM.jpeg" alt="logo">
        <span>NZ PRIME</span>
    </h2>

    <!-- CENTER: Search -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search News...">
        <span id="clearBtn">❌</span>
    </div>

    <!-- RIGHT: Dark mode + Menu -->
    <div class="nav-right">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>

    <!-- NAV LINKS -->
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy Policy</a>
    </div>

</nav>

<!-- BACK BUTTON — outside the article card -->
<div style="max-width:750px; margin: 15px auto 8px; padding: 0 20px;">
    <button onclick="goHome()">← Back to Home</button>
</div>

<!-- NEWS DETAIL CONTENT -->
<div class="news-details">

    <h1 id="title"></h1>

<p class="news-meta">
  By <span id="author"></span>
  •
  <span id="date"></span>
  •
  <span id="readingTime"></span>
</p>

    <img id="image" alt="News Image">

    <div id="desc"></div>

</div>

<script>
    // Load article data from URL params
    const params = new URLSearchParams(window.location.search);

    const title = params.get("title");
    const desc  = params.get("desc");
    const img   = params.get("img");
    const author = params.get("author");
    const date  = params.get("date");

    if (title)  document.getElementById("title").innerText  = title;
    if (desc)   document.getElementById("desc").innerHTML   = desc;
    if (author) document.getElementById("author").innerText = author;
    if (date)   document.getElementById("date").innerText   = date;

    if (img) {
        document.getElementById("image").src = img;
    } else {
        document.getElementById("image").style.display = "none";
    }

    const schema =
document.getElementById("news-schema");

if(schema){

schema.textContent =
JSON.stringify({

"@context":"https://schema.org",

"@type":"NewsArticle",

"headline": title,

"image": [img],

"datePublished": date,

"author":{
 "@type":"Organization",
 "name":"NewsZone Prime"
},

"publisher":{
 "@type":"Organization",
 "name":"NewsZone Prime"
}

});

}

document.title =
title + " - NewsZone Prime";

document
.querySelector(
'meta[property="og:title"]'
)
.setAttribute(
"content",
title
);

document
.querySelector(
'meta[property="og:description"]'
)
.setAttribute(
"content",
desc
);

document
.querySelector(
'meta[property="og:image"]'
)
.setAttribute(
"content",
img
);

document
.querySelector(
'meta[property="og:url"]'
)
.setAttribute(
"content",
window.location.href
);

</script>

<script src="script.js"></script>

</body>
</html>
