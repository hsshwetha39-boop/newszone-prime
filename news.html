<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta id="metaDesc" name="description"
content="Latest India news and breaking updates from NewsZone Prime">

<meta name="robots"
content="index,follow">
    <title>News Details - NewsZone Prime</title>
    <link rel="icon" type="jpeg" href="logo.png">
    <link rel="stylesheet" href="style.css">

    <link id="canonicalLink" rel="canonical"
href="https://hsshwetha39-boop.github.io/newszone-prime/news.html">

    <script
type="application/ld+json"
id="news-schema">

{
 "@context":"https://schema.org",

 "@type":"NewsArticle",

 "headline":"NewsZone Prime",

 "author":{
   "@type":"Organization",
   "name":"NewsZone Prime"
 },

 "publisher":{
 "@type":"Organization",
 "name":"NewsZone Prime",

 "logo":{

 "@type":"ImageObject",

 "url":"https://hsshwetha39-boop.github.io/newszone-prime/logo.png"

 }

}

}

</script>

<meta property="og:type" content="article">

<meta property="og:site_name"
content="NewsZone Prime">

<meta id="ogTitle" property="og:title"
content="NewsZone Prime">

<meta id="ogDesc" property="og:description"
content="Latest India news and breaking updates">

<meta id="ogImage" property="og:image"
content="https://hsshwetha39-boop.github.io/newszone-prime/logo.png">

<meta id="ogUrl" property="og:url"
content="https://hsshwetha39-boop.github.io/newszone-prime/">

<meta name="twitter:card"
content="summary_large_image">

<meta name="twitter:image"
content="https://hsshwetha39-boop.github.io/newszone-prime/logo.png">

</head>
<body class="news-page">

<!-- NAVBAR -->
<nav class="navbar">

    <!-- LEFT: Logo -->
    <h2 class="logo" onclick="goHome()" style="cursor:pointer;">
        <img src="logo.png" alt="logo">
        <span>NZ PRIME</span>
    </h2>

    <!-- CENTER: Search -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search News...">
        <span id="clearBtn">❌</span>
    </div>

    <!-- RIGHT: Dark mode + Menu -->
    <div class="nav-right">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>

    <!-- NAV LINKS -->
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy Policy</a>
    </div>

</nav>

<!-- BACK BUTTON — outside the article card -->
<div style="max-width:750px; margin: 15px auto 8px; padding: 0 20px;">
    <button onclick="goHome()">← Back to Home</button>
</div>

<!-- NEWS DETAIL CONTENT -->
<div class="news-details">

    <h1 id="title"></h1>

<p class="news-meta" id="metaLine">
  By <span id="author"></span>
  <span id="metaSep1">•</span>
  <span id="date"></span>
  <span id="metaSep2">•</span>
  <span id="readingTime"></span>
</p>

<img id="image" alt="News Image">

<div id="desc"></div>

<!-- Shown only when this page is opened without article data -->
<div id="no-article-msg" style="display:none; text-align:center; padding:40px 20px;">
  <p>No article selected. Please go back to the homepage and choose a story to read.</p>
  <button onclick="goHome()">← Back to Home</button>
</div>

<h3>You May Also Like</h3>

<div id="related-news">

<a href="index.html">
Latest Breaking News
</a>

<a href="index.html">
Entertainment Updates
</a>

<a href="index.html">
Trending Stories
</a>

</div>

</div>

<script>
    // Load article data from URL params
    const params = new URLSearchParams(window.location.search);

    const title = params.get("title");
    const desc  = params.get("desc");
    const img   = params.get("img");
    const author = params.get("author");
    const date  = params.get("date");

    if (title)  document.getElementById("title").innerText  = title;
    if (desc)   document.getElementById("desc").innerHTML   = desc;

    // Default author name — always show "By Shwetha" unless a specific
    // author is passed in the URL for that article.
    document.getElementById("author").innerText = author || "Shwetha";

    if (date) {
        document.getElementById("date").innerText = date;
    } else {
        document.getElementById("metaSep1").style.display = "none";
    }

    if (!document.getElementById("readingTime").innerText.trim()) {
        document.getElementById("metaSep2").style.display = "none";
    }

    if (img) {
        document.getElementById("image").src = img;
    } else {
        document.getElementById("image").style.display = "none";
    }

    // If no article data was passed at all, show a friendly fallback
    // instead of a blank-looking page, and tell search engines not to
    // index this bare template URL.
    if (!title && !desc) {
        document.getElementById("no-article-msg").style.display = "block";
        const robotsTag = document.querySelector('meta[name="robots"]');
        if (robotsTag) robotsTag.setAttribute("content", "noindex,follow");
    }

    const schema =
document.getElementById("news-schema");

if(schema){

schema.textContent =
JSON.stringify({

"@context":"https://schema.org",

"@type":"NewsArticle",

"headline": title || "NewsZone Prime",

"image": img ? [img] : [],

"datePublished": date,

"dateModified": date,

"mainEntityOfPage":{
 "@type":"WebPage",

 "@id":window.location.href
},

"author":{
 "@type": "Person",
 "name": author || "Shwetha"
},

"publisher":{
 "@type":"Organization",

 "name":"NewsZone Prime",

 "logo":{

 "@type":"ImageObject",

 "url":"https://hsshwetha39-boop.github.io/newszone-prime/logo.png"

 }

}

});

}

if(title){

document.title =
title +
" - NewsZone Prime";

}

// Make canonical + og:url reflect THIS specific article's full URL
// (including query params), not the bare template page. This is the
// key fix: previously every article pointed its canonical tag back to
// the same empty news.html, telling Google all articles were duplicates
// of one blank page.
const canonicalTag = document.getElementById("canonicalLink");
if (canonicalTag) {
    canonicalTag.setAttribute("href", window.location.href);
}

if(title){

document
.querySelector(
'meta[property="og:title"]'
)
.setAttribute(
"content",
title
);

}

if(desc){

document
.querySelector(
'meta[property="og:description"]'
)
.setAttribute(
"content",
desc
);

document
.getElementById("metaDesc")
.setAttribute("content", desc);

}

if(img){

document
.querySelector(
'meta[property="og:image"]'
)
.setAttribute(
"content",
img
);

}

document
.querySelector(
'meta[property="og:url"]'
)
.setAttribute(
"content",
window.location.href
);

</script>

<script src="script.js"></script>

</body>
</html>
